<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas CRB · Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <span class="emoji">📡</span>
        <h1>Atlas CRB</h1>
        <p>Gestão de Vendas</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-grid" style="grid-template-columns:1fr;">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="btnEntrar">Entrar</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    // Redireciona se já estiver logado
    const { data: { session } } = await supabase.auth.getSession()
    if (session) window.location.href = 'app.html'

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('btnEntrar')
      const errorEl = document.getElementById('loginError')
      errorEl.classList.remove('show')
      btn.textContent = 'Entrando...'
      btn.disabled = true

      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value

      const { error } = await supabase.auth.signInWithPassword({ email, password: senha })

      if (error) {
        const msgs = {
          'Invalid login credentials': 'E-mail ou senha incorretos.',
          'Email not confirmed': 'Confirme seu e-mail antes de entrar.',
          'Too many requests': 'Muitas tentativas. Aguarde alguns minutos.',
        }
        errorEl.textContent = msgs[error.message] || 'Erro ao entrar. Tente novamente.'
        errorEl.classList.add('show')
        btn.textContent = 'Entrar'
        btn.disabled = false
      } else {
        window.location.href = 'app.html'
      }
    })
  </script>
</body>
</html>
