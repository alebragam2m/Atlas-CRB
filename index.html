<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Atlas Point · Login</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='8' fill='%230D1B2A'/%3E%3Ccircle cx='20' cy='20' r='14' stroke='%23F0F4F8' stroke-width='1.8'/%3E%3Cellipse cx='20' cy='20' rx='7' ry='14' stroke='%232E86AB' stroke-width='1.4'/%3E%3Cline x1='6' y1='20' x2='34' y2='20' stroke='%232E86AB' stroke-width='1.4'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23F7A800'/%3E%3C/svg%3E"/>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="login-logo-mark">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="#F0F4F8" stroke-width="2"/>
            <ellipse cx="20" cy="20" rx="9" ry="18" stroke="#2E86AB" stroke-width="1.6"/>
            <line x1="2" y1="20" x2="38" y2="20" stroke="#2E86AB" stroke-width="1.6"/>
            <circle cx="20" cy="20" r="4" fill="#F7A800"/>
            <circle cx="20" cy="20" r="1.5" fill="#0D1B2A"/>
          </svg>
        </div>
        <h1>Atlas Point</h1>
        <p>mapping tech</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-grid" style="grid-template-columns:1fr;">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@atlaspoint.com.br" required autocomplete="email"/>
          </div>
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password"/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="btnEntrar">Entrar</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    const { data: { session } } = await supabase.auth.getSession()
    if (session) window.location.href = 'app.html'

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('btnEntrar')
      const errorEl = document.getElementById('loginError')
      errorEl.classList.remove('show')
      btn.textContent = 'Entrando...'
      btn.disabled = true

      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value

      const { error } = await supabase.auth.signInWithPassword({ email, password: senha })

      if (error) {
        const msgs = {
          'Invalid login credentials': 'E-mail ou senha incorretos.',
          'Email not confirmed': 'Confirme seu e-mail antes de entrar.',
          'Too many requests': 'Muitas tentativas. Aguarde alguns minutos.',
        }
        errorEl.textContent = msgs[error.message] || 'Erro ao entrar. Tente novamente.'
        errorEl.classList.add('show')
        btn.textContent = 'Entrar'
        btn.disabled = false
      } else {
        window.location.href = 'app.html'
      }
    })
  </script>
</body>
</html>
